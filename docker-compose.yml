services:
  postgres:
    image: postgres:16-alpine
    container_name: ethos-postgres
    restart: always
    environment:
      POSTGRES_USER: ethos
      POSTGRES_PASSWORD: ethos
      POSTGRES_DB: ethos
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ethos']
      interval: 5s
      timeout: 5s
      retries: 10

  ethos-api:
    build: .
    container_name: ethos-api
    restart: always
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://ethos:ethos@postgres:5432/ethos
      NODE_ENV: production
      HOST: '0.0.0.0'
    depends_on:
      postgres:
        condition: service_healthy
