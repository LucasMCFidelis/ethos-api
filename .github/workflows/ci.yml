name: CI/CD Pipeline

on:
  pull_request:
  push:
    branches: [main, homolog, develop]

jobs:
  # ─────────────────────────────────────────
  # 1. BUILD & LINT
  # ─────────────────────────────────────────
  ci:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Build
        env:
          DATABASE_URL: "postgresql://user:password@localhost:5432/pipoca"
        run: |
          npx prisma generate
          npm run build

  # ─────────────────────────────────────────
  # 2. API TESTS
  # Stack sobe uma vez — smoke bloqueia full suite
  # ─────────────────────────────────────────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout ethos-api
        uses: actions/checkout@v4

      - name: Checkout QA
        uses: actions/checkout@v4
        with:
          repository: LucasMCFidelis/ethos-qa
          path: cypress-tests

      - name: Start stack via Docker Compose
        run: docker compose up -d

      - name: Wait for API
        uses: ./cypress-tests/.github/actions/wait-for-api
        with:
          url: http://localhost:3000/api/v1/health

      - name: Run QA Suite
        uses: ./cypress-tests/.github/actions/run-cypress
        with:
          base_url: http://localhost:8080
          api_url: http://localhost:3000/api/v1
          smoke-command: npm run cy:api -- --expose grepTags=@smoke
          regression-command: npm run cy:api -- --expose grepTags="-@smoke"

      - name: Teardown stack
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────
  # 3. DEPLOY DEV
  # ─────────────────────────────────────────
  deploy-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest
    needs: [ci, api-tests]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL_DEV }}
        run: curl "$deploy_url"